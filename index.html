<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="referrer" content="no-referrer">
  <title>植物光照查询器</title>
  <link rel="stylesheet" href="style.css?v=81">
</head>
<body>

  <div class="container">
    <!-- 页面标题 -->
    <div class="header">
      <div class="header-top">
        <h1>植物光照查询器</h1>
        <div class="header-buttons">
          <button class="btn-recommend" id="btnSearch">搜索</button>
          <button class="btn-recommend" id="btnRecommend">推荐</button>
          <button class="btn-sync" id="btnSync">同步</button>
        </div>
      </div>
      <p id="headerDesc">按光照条件将植物归类 / 共收录0种植物</p>
    </div>

    <!-- 5个分类区域 -->
    <div id="zones"></div>

  </div>

  <!-- 详情卡片遮罩层 -->
  <div class="overlay" id="overlay">
    <div class="card-flip-container" id="cardFlipContainer">
      <div class="card-flip-inner">
      <!-- 正面：详情信息 -->
      <div class="card card-front" id="card">
        <div class="card-header">
          <div class="card-title-row">
            <div class="card-title" id="cardTitle"></div>
            <img class="card-photo-btn" id="cardPhotoBtn" src="leaf-icon.webp" alt="查看照片" title="查看照片">
          </div>
          <button class="card-close" id="cardClose">关闭</button>
        </div>

        <!-- 基本信息 -->
        <div class="card-group">
          <div class="card-group-title">基本信息</div>
          <div class="card-row">
            <span class="card-label">科属种</span>
            <span class="card-value" id="cardFamily"></span>
          </div>
          <div class="card-row">
            <span class="card-label">原产地</span>
            <span class="card-value" id="cardOrigin"></span>
          </div>
          <div class="card-row">
            <span class="card-label">难易度</span>
            <span class="card-value card-stars" id="cardDifficulty"></span>
          </div>
        </div>

        <!-- 环境习性 -->
        <div class="card-group">
          <div class="card-group-title">环境习性</div>
          <div class="card-row">
            <span class="card-label">光照</span>
            <span class="card-value" id="cardLight"></span>
          </div>
          <div class="card-row">
            <span class="card-label">温度</span>
            <span class="card-value" id="cardTemperature"></span>
          </div>
          <div class="card-row">
            <span class="card-label">湿度</span>
            <span class="card-value" id="cardHumidity"></span>
          </div>
        </div>

        <!-- 养护操作 -->
        <div class="card-group">
          <div class="card-group-title">养护操作</div>
          <div class="card-row">
            <span class="card-label">浇水</span>
            <span class="card-value" id="cardWatering"></span>
          </div>
          <div class="card-row">
            <span class="card-label">施肥</span>
            <span class="card-value" id="cardFertilizer"></span>
          </div>
          <div class="card-row">
            <span class="card-label">土壤</span>
            <span class="card-value" id="cardSoil"></span>
          </div>
        </div>

        <div class="card-buttons">
          <button class="card-btn-delete" id="cardDelete">删除</button>
          <button class="card-bought" id="cardBought">已购</button>
        </div>
      </div>

      <!-- 背面：植物照片 -->
      <div class="card card-back" id="cardBack">
        <div class="card-header">
          <div class="card-title-row">
            <div class="card-title" id="cardBackTitle"></div>
            <img class="card-photo-btn" id="cardBackBtn" src="leaf-icon.webp" alt="返回详情" title="返回详情">
          </div>
          <button class="card-close" id="cardBackClose">关闭</button>
        </div>
        <div class="card-photos" id="cardPhotos"></div>
      </div>
      </div>
    </div>
  </div>

  <!-- 搜索植物卡片遮罩层 -->
  <div class="overlay" id="searchOverlay">
    <div class="card" id="searchCard">
      <div class="card-header">
        <div class="card-title">搜索植物</div>
        <button class="card-close" id="searchClose">关闭</button>
      </div>
      <div class="search-input-wrap">
        <input type="text" class="search-input" id="searchInput" placeholder="输入植物名称">
      </div>
      <div class="search-divider"></div>
      <div class="search-results" id="searchResults"></div>
    </div>
  </div>

  <!-- 推荐植物卡片遮罩层 -->
  <div class="overlay" id="recOverlay">
    <div class="card-flip-container" id="recFlipContainer">
      <div class="card-flip-inner">
      <!-- 正面：推荐详情 -->
      <div class="card card-front" id="recCard">
        <div class="card-header">
          <div class="card-title-row">
            <div class="card-title" id="recTitle"></div>
            <img class="card-photo-btn" id="recPhotoBtn" src="leaf-icon.webp" alt="查看照片" title="查看照片">
          </div>
          <div class="card-header-btns">
            <button class="card-close" id="recRefresh">刷新</button>
            <button class="card-close" id="recClose">关闭</button>
          </div>
        </div>

        <!-- 基本信息 -->
        <div class="card-group">
          <div class="card-group-title">基本信息</div>
          <div class="card-row">
            <span class="card-label">科属种</span>
            <span class="card-value" id="recFamily"></span>
          </div>
          <div class="card-row">
            <span class="card-label">原产地</span>
            <span class="card-value" id="recOrigin"></span>
          </div>
          <div class="card-row">
            <span class="card-label">难易度</span>
            <span class="card-value card-stars" id="recDifficulty"></span>
          </div>
        </div>

        <!-- 环境习性 -->
        <div class="card-group">
          <div class="card-group-title">环境习性</div>
          <div class="card-row">
            <span class="card-label">光照</span>
            <span class="card-value" id="recLight"></span>
          </div>
          <div class="card-row">
            <span class="card-label">温度</span>
            <span class="card-value" id="recTemperature"></span>
          </div>
          <div class="card-row">
            <span class="card-label">湿度</span>
            <span class="card-value" id="recHumidity"></span>
          </div>
        </div>

        <!-- 养护操作 -->
        <div class="card-group">
          <div class="card-group-title">养护操作</div>
          <div class="card-row">
            <span class="card-label">浇水</span>
            <span class="card-value" id="recWatering"></span>
          </div>
          <div class="card-row">
            <span class="card-label">施肥</span>
            <span class="card-value" id="recFertilizer"></span>
          </div>
          <div class="card-row">
            <span class="card-label">土壤</span>
            <span class="card-value" id="recSoil"></span>
          </div>
        </div>

        <div class="rec-footer">
          <div class="rec-zone-select">
            <span class="rec-zone-label">区域</span>
            <div class="rec-zone-radios" id="recZoneRadios"></div>
          </div>
          <button class="btn-add" id="recAdd">添加</button>
        </div>
      </div>

      <!-- 背面：植物照片 -->
      <div class="card card-back" id="recCardBack">
        <div class="card-header">
          <div class="card-title-row">
            <div class="card-title" id="recBackTitle"></div>
            <img class="card-photo-btn" id="recBackBtn" src="leaf-icon.webp" alt="返回详情" title="返回详情">
          </div>
          <div class="card-header-btns">
            <button class="card-close" id="recBackRefresh">刷新</button>
            <button class="card-close" id="recBackClose">关闭</button>
          </div>
        </div>
        <div class="card-photos" id="recPhotos"></div>
      </div>
      </div>
    </div>
  </div>

  <!-- 自定义确认对话框 -->
  <div class="overlay" id="confirmOverlay">
    <div class="confirm-dialog">
      <div class="confirm-message" id="confirmMessage"></div>
      <div class="confirm-buttons">
        <button class="confirm-btn-cancel" id="confirmCancel">取消</button>
        <button class="confirm-btn-ok" id="confirmOk">确认删除</button>
      </div>
    </div>
  </div>

  <!-- 每日身份验证弹窗 -->
  <div class="overlay" id="dailyAuthOverlay">
    <div class="daily-auth-dialog">
      <div class="daily-auth-title">Nature does not hurry,<br>yet everything is accomplished.</div>
      <div class="daily-auth-input-wrap" id="dailyAuthInputWrap">
        <input type="text" class="daily-auth-input" id="dailyAuthInput" placeholder="" maxlength="30" autocomplete="off">
        <span class="daily-auth-caret" id="dailyAuthCaret"></span>
      </div>
      <button class="daily-auth-btn" id="dailyAuthConfirm">确认</button>
    </div>
  </div>

  <!-- 同步状态 toast -->
  <div class="sync-toast" id="syncToast"></div>

  <!-- 科/属详情遮罩层 -->
  <div class="overlay" id="taxonomyOverlay">
    <div class="card" id="taxonomyCard">
      <div class="card-header">
        <div class="card-title" id="taxonomyTitle"></div>
        <button class="card-close" id="taxonomyClose">关闭</button>
      </div>
      <div class="taxonomy-desc" id="taxonomyDesc"></div>
      <div class="taxonomy-divider"></div>
      <div class="taxonomy-children" id="taxonomyChildren"></div>
    </div>
  </div>

  <script src="plant-database.js?v=3"></script>
  <script src="plant-photos.js?v=2"></script>
  <script src="supabase-sync.js?v=3"></script>
  <script>
    // 区域配置
    const zones = [
      { id: 1, label: '1', condition: '室外散光（北花园）' },
      { id: 2, label: '2', condition: '室内弱散光（北窗）' },
      { id: 3, label: '3', condition: '室内耐阴（过道+地下室）' },
      { id: 4, label: '4', condition: '室内强散光（南窗）' },
      { id: 5, label: '5', condition: '室外强光（南花园）' }
    ];

    // ========== 数据持久化（localStorage） ==========
    // STORAGE_KEY_ZONE_PLANTS: 存储当前在5区域内显示的植物 [{name, zone}]
    var STORAGE_KEY_ZONE_PLANTS = 'plant_zone_list';
    var STORAGE_KEY_BOUGHT = 'plant_bought_names';

    // 读取当前区域内的植物列表
    function getZonePlants() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY_ZONE_PLANTS)) || null;
      } catch(e) { return null; }
    }

    // 保存当前区域内的植物列表
    function saveZonePlants(list) {
      var simplified = list.map(function(p) { return { name: p.name, zone: p.zone }; });
      localStorage.setItem(STORAGE_KEY_ZONE_PLANTS, JSON.stringify(simplified));
    }

    // 读取已购植物名单
    function getBoughtNames() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY_BOUGHT)) || [];
      } catch(e) { return []; }
    }

    // 保存已购植物名单
    function saveBoughtNames(names) {
      localStorage.setItem(STORAGE_KEY_BOUGHT, JSON.stringify(names));
    }

    // 从植物库中查找完整数据
    function findInDatabase(name) {
      return plantDatabase.find(function(p) { return p.name === name; });
    }

    // 初始化：首次使用加载默认27种植物，之后从 localStorage 恢复
    function initPlants() {
      var savedZonePlants = getZonePlants();
      var boughtNames = getBoughtNames();
      var result = [];

      if (savedZonePlants === null) {
        // 首次使用：加载所有 isDefault=true 的植物到对应区域
        plantDatabase.forEach(function(p) {
          if (p.isDefault) {
            result.push({
              name: p.name,
              zone: p.defaultZone,
              family: p.family,
              origin: p.origin,
              difficulty: p.difficulty,
              light: p.light,
              temperature: p.temperature,
              humidity: p.humidity,
              watering: p.watering,
              fertilizer: p.fertilizer,
              soil: p.soil
            });
          }
        });
        // 保存初始状态
        saveZonePlants(result);
      } else {
        // 从 localStorage 恢复：用保存的 name+zone 去植物库查完整数据
        savedZonePlants.forEach(function(sp) {
          var dbPlant = findInDatabase(sp.name);
          if (dbPlant) {
            result.push({
              name: dbPlant.name,
              zone: sp.zone,
              family: dbPlant.family,
              origin: dbPlant.origin,
              difficulty: dbPlant.difficulty,
              light: dbPlant.light,
              temperature: dbPlant.temperature,
              humidity: dbPlant.humidity,
              watering: dbPlant.watering,
              fertilizer: dbPlant.fertilizer,
              soil: dbPlant.soil
            });
          }
        });
      }

      // 恢复已购状态
      result.forEach(function(p) {
        if (boughtNames.indexOf(p.name) !== -1) {
          p.bought = true;
        }
      });

      return result;
    }

    var plants = initPlants();
    // 卡片翻转状态
    var cardFlipped = false;
    var recCardFlipped = false;

    // 翻转到照片面
    function flipToPhotos() {
      if (!currentPlant) return;
      var photos = getPlantPhotos(currentPlant.name);
      document.getElementById('cardBackTitle').textContent = currentPlant.name;
      var photosHTML = photos.map(function(url) {
        return '<div class="card-photo-item"><img src="' + url + '" alt="' + currentPlant.name + '" loading="lazy"></div>';
      }).join('');
      document.getElementById('cardPhotos').innerHTML = photosHTML;
      document.getElementById('cardFlipContainer').classList.add('flipped');
      cardFlipped = true;
    }

    // 翻转回详情面
    function flipToDetails() {
      document.getElementById('cardFlipContainer').classList.remove('flipped');
      cardFlipped = false;
    }

    // 生成星级（难易度：5星=最难，1星=最容易，数据库中值越大越容易，所以反转显示）
    function renderStars(n) {
      var display = 6 - n; // 反转：数据库5→显示1星，数据库1→显示5星
      if (display < 1) display = 1;
      if (display > 5) display = 5;
      let html = '';
      for (let i = 0; i < 5; i++) {
        if (i < display) {
          html += '★';
        } else {
          html += '<span class="empty">☆</span>';
        }
      }
      return html;
    }

    // 渲染科属种为可点击链接
    function renderFamilyLinks(familyStr) {
      var parts = familyStr.split(' / ');
      if (parts.length < 3) return familyStr;
      var familyName = parts[0];  // 科
      var genusName = parts[1];   // 属
      var speciesName = parts[2]; // 种
      return '<span class="taxonomy-link" onclick="showTaxonomyCard(\'family\', \'' + familyName + '\')">' + familyName + '</span>' +
        ' / ' +
        '<span class="taxonomy-link" onclick="showTaxonomyCard(\'genus\', \'' + genusName + '\', \'' + familyName + '\')">' + genusName + '</span>' +
        ' / ' + speciesName;
    }

    // 获取所有植物数据源（直接使用统一植物库）
    function getAllPlantSources() {
      return plantDatabase;
    }

    // ========== 自定义确认对话框 ==========
    var confirmCallback = null;

    function showConfirmDialog(message, onConfirm) {
      confirmCallback = onConfirm;
      document.getElementById('confirmMessage').textContent = message;
      document.getElementById('confirmOk').textContent = '确认删除';
      document.getElementById('confirmCancel').style.display = '';
      document.getElementById('confirmOverlay').classList.add('active');
    }

    function hideConfirmDialog() {
      document.getElementById('confirmOverlay').classList.remove('active');
      confirmCallback = null;
    }

    document.getElementById('confirmOk').addEventListener('click', function() {
      var cb = confirmCallback;
      hideConfirmDialog();
      if (cb) cb();
    });

    document.getElementById('confirmCancel').addEventListener('click', hideConfirmDialog);

    document.getElementById('confirmOverlay').addEventListener('click', function(e) {
      if (e.target === this) hideConfirmDialog();
    });

    // 关闭所有卡片（确保同一时间只有一种卡片）
    function hideAllCards() {
      document.getElementById('overlay').classList.remove('active');
      document.getElementById('cardFlipContainer').classList.remove('flipped');
      cardFlipped = false;
      document.getElementById('recOverlay').classList.remove('active');
      document.getElementById('recFlipContainer').classList.remove('flipped');
      recCardFlipped = false;
      document.getElementById('searchOverlay').classList.remove('active');
      document.getElementById('dailyAuthOverlay').classList.remove('active');
      document.getElementById('taxonomyOverlay').classList.remove('active');
      document.getElementById('confirmOverlay').classList.remove('active');
      confirmCallback = null;
    }

    // 显示科/属详情页

    function showTaxonomyCard(type, name, parentFamily) {
      // 先关闭所有已打开的卡片
      hideAllCards();

      var allPlants = getAllPlantSources();
      var title, desc, children;

      if (type === 'family') {
        // 科详情：标题=科名，下级=常见属名标签（最多10个）
        title = name;

        // 优先使用知识库中的常见属
        var genusList = familyGenusMap[name];
        if (!genusList) {
          // 回退：从植物数据中提取
          var genusSet = {};
          allPlants.forEach(function(p) {
            var parts = p.family.split(' / ');
            if (parts[0] === name) {
              genusSet[parts[1]] = true;
            }
          });
          genusList = Object.keys(genusSet);
        }
        var showList = genusList.slice(0, 10);
        desc = '常见属（共 ' + showList.length + ' 个）';
        children = '<div class="taxonomy-tags">' + showList.map(function(g) {
          return '<span class="taxonomy-tag">' + g + '</span>';
        }).join('') + '</div>';
      } else {
        // 属详情：标题=属名，下级=常见种名标签（最多10个）
        title = name;

        // 优先使用知识库中的常见种
        var speciesList = genusSpeciesMap[name];
        if (!speciesList) {
          // 回退：从植物数据中提取
          speciesList = [];
          allPlants.forEach(function(p) {
            var parts = p.family.split(' / ');
            if (parts[1] === name) {
              speciesList.push(parts[2]);
            }
          });
        }
        var showList = speciesList.slice(0, 10);
        desc = '所属：' + (parentFamily || '') + '　|　常见种（共 ' + showList.length + ' 个）';
        children = '<div class="taxonomy-tags">' + showList.map(function(s) {
          return '<span class="taxonomy-tag">' + s + '</span>';
        }).join('') + '</div>';
      }

      document.getElementById('taxonomyTitle').textContent = title;
      document.getElementById('taxonomyDesc').textContent = desc;
      document.getElementById('taxonomyChildren').innerHTML = children;
      document.getElementById('taxonomyOverlay').classList.add('active');
    }

    function hideTaxonomyCard() {
      document.getElementById('taxonomyOverlay').classList.remove('active');
    }

    // 渲染区域和植物
    function render() {
      const zonesEl = document.getElementById('zones');
      zonesEl.innerHTML = '';

      zones.forEach(function(zone) {
        const zonePlants = plants.filter(function(p) { return p.zone === zone.id; });

        const zoneDiv = document.createElement('div');
        zoneDiv.className = 'zone';

        // 区域头部（点击标题可推荐该区域专属植物）
        const headerDiv = document.createElement('div');
        headerDiv.className = 'zone-header zone-header-clickable';
        var conditionHTML = zone.condition.replace(/(\uff08[^\uff09]*\uff09)/g, '<span class="zone-condition-sub">$1</span>');
        headerDiv.innerHTML = '<span class="zone-number">' + zone.label + '</span>' +
          '<span class="zone-condition">' + conditionHTML + '</span>';
        headerDiv.addEventListener('click', (function(zoneId) {
          return function() {
            showRecCard(getRandomRecommend(zoneId), zoneId);
          };
        })(zone.id));
        zoneDiv.appendChild(headerDiv);

        // 植物列表
        const listDiv = document.createElement('div');
        listDiv.className = 'plant-list';

        if (zonePlants.length === 0) {
          listDiv.innerHTML = '<span class="plant-empty">暂无植物</span>';
        } else {
          zonePlants.forEach(function(plant) {
            const tag = document.createElement('span');
            tag.className = 'plant-tag' + (plant.bought ? ' plant-tag-bought' : '');
            tag.textContent = plant.name;
            tag.addEventListener('click', function() {
              showCard(plant);
            });
            listDiv.appendChild(tag);
          });
        }

        zoneDiv.appendChild(listDiv);
        zonesEl.appendChild(zoneDiv);
      });

      // 更新标题描述中的植物数量
      document.getElementById('headerDesc').textContent = '按光照条件归类植物｜已收藏' + plants.length + '/' + plantDatabase.length + '种植物';
    }

      // 先关闭所有已打开的卡片

      document.getElementById('cardFlipContainer').classList.remove('flipped');

      document.getElementById('cardTitle').textContent = plant.name;
      document.getElementById('cardFamily').innerHTML = renderFamilyLinks(plant.family);
      document.getElementById('cardOrigin').textContent = plant.origin;
      document.getElementById('cardDifficulty').innerHTML = renderStars(plant.difficulty);
      document.getElementById('cardLight').textContent = plant.light;
      document.getElementById('cardTemperature').textContent = plant.temperature;
      document.getElementById('cardHumidity').textContent = plant.humidity;
      document.getElementById('cardWatering').textContent = plant.watering;
      document.getElementById('cardFertilizer').textContent = plant.fertilizer;
      document.getElementById('cardSoil').textContent = plant.soil;
      document.getElementById('cardBought').textContent = plant.bought ? '未购' : '已购';
      document.getElementById('overlay').classList.add('active');
    }

    // 关闭卡片
    function hideCard() {
      document.getElementById('overlay').classList.remove('active');
      // 重置翻转
      document.getElementById('cardFlipContainer').classList.remove('flipped');
      cardFlipped = false;
    }

    // 翻转按钮事件
    document.getElementById('cardPhotoBtn').addEventListener('click', flipToPhotos);
    document.getElementById('cardBackBtn').addEventListener('click', flipToDetails);
    document.getElementById('cardBackClose').addEventListener('click', hideCard);

    document.getElementById('cardClose').addEventListener('click', hideCard);
    document.getElementById('cardDelete').addEventListener('click', function() {
      if (!currentPlant) return;
      showConfirmDialog('确认从区域中删除「' + currentPlant.name + '」吗？', function() {
        var plantName = currentPlant.name;
        var idx = plants.findIndex(function(p) { return p.name === plantName; });
        if (idx > -1) {
          plants.splice(idx, 1);

          // 同步到 localStorage（直接保存当前区域内的植物列表）
          saveZonePlants(plants);

          hideCard();
          render();
        }
      });
    });
    document.getElementById('cardBought').addEventListener('click', function() {
      if (currentPlant) {
        currentPlant.bought = !currentPlant.bought;

        // 同步到 localStorage
        var boughtNames = getBoughtNames();
        if (currentPlant.bought) {
          if (boughtNames.indexOf(currentPlant.name) === -1) {
            boughtNames.push(currentPlant.name);
          }
        } else {
          boughtNames = boughtNames.filter(function(n) { return n !== currentPlant.name; });
        }
        saveBoughtNames(boughtNames);
        saveZonePlants(plants);

        hideCard();
        render();
      }
    });
    document.getElementById('overlay').addEventListener('click', function(e) {
      if (e.target === this) {
        hideCard();
      }
    });

    // ========== 搜索植物功能 ==========
    var searchStateKeyword = ''; // 记忆上次的关键词

    function showSearchCard() {
      document.getElementById('searchOverlay').classList.add('active');
      // 恢复上次的关键词和结果
      document.getElementById('searchInput').value = searchStateKeyword;
      renderSearchResults(searchStateKeyword);
      setTimeout(function() {
        document.getElementById('searchInput').focus();
      }, 100);
    }

    function hideSearchCard() {
      // 保存当前关键词
      searchStateKeyword = document.getElementById('searchInput').value;
      document.getElementById('searchOverlay').classList.remove('active');
    }

    function renderSearchResults(keyword) {
      var resultsDiv = document.getElementById('searchResults');
      var kw = keyword.trim();

      // 无关键词：显示全部500种，按数据库原始顺序
      if (!kw) {
        var html = '';
        plantDatabase.forEach(function(p) {
          var inZone = plants.some(function(zp) { return zp.name === p.name; });
          var cls = 'search-result-tag' + (inZone ? ' search-collected' : '');
          html += '<span class="' + cls + '" data-name="' + p.name + '">' + p.name + '</span>';
        });
        resultsDiv.innerHTML = html;
        return;
      }

      // 逐字拆分关键词，去重
      var chars = [];
      for (var i = 0; i < kw.length; i++) {
        var c = kw[i].toLowerCase();
        if (chars.indexOf(c) === -1) chars.push(c);
      }

      // 匹配：植物名中包含任意1个关键字即命中
      var matched = [];
      plantDatabase.forEach(function(p, idx) {
        var matchCount = 0;
        var matchedChars = [];
        for (var j = 0; j < chars.length; j++) {
          if (p.name.toLowerCase().indexOf(chars[j]) !== -1) {
            matchCount++;
            matchedChars.push(chars[j]);
          }
        }
        if (matchCount > 0) {
          var inZone = plants.some(function(zp) { return zp.name === p.name; });
          matched.push({ plant: p, matchCount: matchCount, matchedChars: matchedChars, inZone: inZone, dbIndex: idx });
        }
      });

      // 排序：匹配字数降序 → 已收藏优先 → 数据库原始顺序
      matched.sort(function(a, b) {
        if (b.matchCount !== a.matchCount) return b.matchCount - a.matchCount;
        if (a.inZone !== b.inZone) return a.inZone ? -1 : 1;
        return a.dbIndex - b.dbIndex;
      });

      if (matched.length === 0) {
        resultsDiv.innerHTML = '<div class="search-empty">未找到相关植物</div>';
        return;
      }

      // 渲染标签，高亮匹配字
      var html = '';
      matched.forEach(function(item) {
        var name = item.plant.name;
        var highlightedName = '';
        for (var k = 0; k < name.length; k++) {
          var ch = name[k];
          if (item.matchedChars.indexOf(ch.toLowerCase()) !== -1) {
            highlightedName += '<span class="search-highlight">' + ch + '</span>';
          } else {
            highlightedName += ch;
          }
        }
        html += '<span class="search-result-tag" data-name="' + name + '">' + highlightedName + '</span>';
      });
      resultsDiv.innerHTML = html;
    }

    // 初始化：默认显示全部植物
    renderSearchResults('');

    // 搜索按钮
    document.getElementById('btnSearch').addEventListener('click', showSearchCard);

    // 实时搜索
    document.getElementById('searchInput').addEventListener('input', function() {
      renderSearchResults(this.value);
    });

    // 点击搜索结果，打开该植物的推荐卡片
    document.getElementById('searchResults').addEventListener('click', function(e) {
      var tag = e.target.closest('.search-result-tag');
      if (!tag) return;
      var name = tag.getAttribute('data-name');
      var plant = plantDatabase.find(function(p) { return p.name === name; });
      if (plant) {
        // 保存当前状态后关闭
        searchStateKeyword = document.getElementById('searchInput').value;
        document.getElementById('searchOverlay').classList.remove('active');
        showRecCard(plant);
      }
    });

    // 关闭搜索卡片
    document.getElementById('searchClose').addEventListener('click', hideSearchCard);
    document.getElementById('searchOverlay').addEventListener('click', function(e) {
      if (e.target === this) hideSearchCard();
    });

    // ========== 推荐植物功能 ==========
    // 从统一植物库中随机推荐，排除已在5区域内显示的植物

    var currentRecPlant = null;
    var currentRecZoneFilter = null; // 当前推荐弹窗的区域过滤（null=不过滤）

    // 随机获取一个推荐植物（排除已在区域内显示的，可按区域过滤）
    function getRandomRecommend(zoneFilter) {
      var available = plantDatabase.filter(function(dbp) {
        // 排除已在区域中的植物
        if (plants.some(function(p) { return p.name === dbp.name; })) return false;
        // 如果有区域过滤，只推荐 defaultZone 匹配的植物
        if (zoneFilter) return dbp.defaultZone === zoneFilter;
        return true;
      });
      if (available.length === 0) {
        // 所有符合条件的植物都已在区域中，从符合区域条件的全库中随机
        available = plantDatabase.filter(function(dbp) {
          if (zoneFilter) return dbp.defaultZone === zoneFilter;
          return true;
        });
      }
      if (available.length === 0) return plantDatabase[Math.floor(Math.random() * plantDatabase.length)];
      return available[Math.floor(Math.random() * available.length)];
    }

    // 渲染推荐卡片内容（zoneFilter: 可选，按区域过滤推荐）
    function showRecCard(plant, zoneFilter) {
      // 先关闭所有已打开的卡片
      hideAllCards();

      currentRecPlant = plant;
      currentRecZoneFilter = zoneFilter || null;
      // 重置为正面
      document.getElementById('recFlipContainer').classList.remove('flipped');
      recCardFlipped = false;

      document.getElementById('recTitle').textContent = plant.name;
      document.getElementById('recFamily').innerHTML = renderFamilyLinks(plant.family);
      document.getElementById('recOrigin').textContent = plant.origin;
      document.getElementById('recDifficulty').innerHTML = renderStars(plant.difficulty);
      document.getElementById('recLight').textContent = plant.light;
      document.getElementById('recTemperature').textContent = plant.temperature;
      document.getElementById('recHumidity').textContent = plant.humidity;
      document.getElementById('recWatering').textContent = plant.watering;
      document.getElementById('recFertilizer').textContent = plant.fertilizer;
      document.getElementById('recSoil').textContent = plant.soil;

      // 渲染区域单选按钮
      var radiosHTML = '';
      var checkedZone = zoneFilter || plant.defaultZone;
      zones.forEach(function(zone) {
        radiosHTML += '<label><input type="radio" name="recZone" value="' + zone.id + '"' +
          (zone.id === checkedZone ? ' checked' : '') + '>' + zone.id + ' ' + zone.condition + '</label>';
      });
      document.getElementById('recZoneRadios').innerHTML = radiosHTML;

      document.getElementById('recOverlay').classList.add('active');
    }

    function hideRecCard() {
      document.getElementById('recOverlay').classList.remove('active');
      document.getElementById('recFlipContainer').classList.remove('flipped');
      recCardFlipped = false;
    }

    // 推荐卡片翻转到照片面
    function recFlipToPhotos() {
      if (!currentRecPlant) return;
      var photos = getPlantPhotos(currentRecPlant.name);
      document.getElementById('recBackTitle').textContent = currentRecPlant.name;
      var photosHTML = photos.map(function(url) {
        return '<div class="card-photo-item"><img src="' + url + '" alt="' + currentRecPlant.name + '" loading="lazy"></div>';
      }).join('');
      document.getElementById('recPhotos').innerHTML = photosHTML;
      document.getElementById('recFlipContainer').classList.add('flipped');
      recCardFlipped = true;
    }

    // 推荐卡片翻转回详情面
    function recFlipToDetails() {
      document.getElementById('recFlipContainer').classList.remove('flipped');
      recCardFlipped = false;
    }

    // 推荐卡片翻转按钮事件
    document.getElementById('recPhotoBtn').addEventListener('click', recFlipToPhotos);
    document.getElementById('recBackBtn').addEventListener('click', recFlipToDetails);
    document.getElementById('recBackClose').addEventListener('click', hideRecCard);
    document.getElementById('recBackRefresh').addEventListener('click', function() {
      var newPlant = getRandomRecommend(currentRecZoneFilter);
      currentRecPlant = newPlant;
      document.getElementById('recTitle').textContent = newPlant.name;
      document.getElementById('recFamily').innerHTML = renderFamilyLinks(newPlant.family);
      document.getElementById('recOrigin').textContent = newPlant.origin;
      document.getElementById('recDifficulty').innerHTML = renderStars(newPlant.difficulty);
      document.getElementById('recLight').textContent = newPlant.light;
      document.getElementById('recTemperature').textContent = newPlant.temperature;
      document.getElementById('recHumidity').textContent = newPlant.humidity;
      document.getElementById('recWatering').textContent = newPlant.watering;
      document.getElementById('recFertilizer').textContent = newPlant.fertilizer;
      document.getElementById('recSoil').textContent = newPlant.soil;
      var radiosHTML = '';
      var checkedZone = currentRecZoneFilter || newPlant.defaultZone;
      zones.forEach(function(zone) {
        radiosHTML += '<label><input type="radio" name="recZone" value="' + zone.id + '"' +
          (zone.id === checkedZone ? ' checked' : '') + '>' + zone.id + ' ' + zone.condition + '</label>';
      });
      document.getElementById('recZoneRadios').innerHTML = radiosHTML;
      recFlipToPhotos();
    });

    // 推荐植物按钮（全局推荐，不限区域）
    document.getElementById('btnRecommend').addEventListener('click', function() {
      showRecCard(getRandomRecommend(null), null);
    });

    // 刷新按钮（保持当前的区域过滤）
    document.getElementById('recRefresh').addEventListener('click', function() {
      showRecCard(getRandomRecommend(currentRecZoneFilter), currentRecZoneFilter);
    });

    // 关闭按钮
    document.getElementById('recClose').addEventListener('click', hideRecCard);

    // 添加按钮
    document.getElementById('recAdd').addEventListener('click', function() {
      if (!currentRecPlant) return;
      var selected = document.querySelector('input[name="recZone"]:checked');
      if (!selected) return;
      var zoneId = parseInt(selected.value);

      // 检查是否已存在
      if (plants.some(function(p) { return p.name === currentRecPlant.name; })) {
        showConfirmDialog('「' + currentRecPlant.name + '」已在区域列表中', function() {});
        document.getElementById('confirmOk').textContent = '知道了';
        document.getElementById('confirmCancel').style.display = 'none';
        return;
      }

      var newPlant = {
        name: currentRecPlant.name,
        zone: zoneId,
        family: currentRecPlant.family,
        origin: currentRecPlant.origin,
        difficulty: currentRecPlant.difficulty,
        light: currentRecPlant.light,
        temperature: currentRecPlant.temperature,
        humidity: currentRecPlant.humidity,
        watering: currentRecPlant.watering,
        fertilizer: currentRecPlant.fertilizer,
        soil: currentRecPlant.soil
      };

      plants.push(newPlant);

      // 保存到 localStorage
      saveZonePlants(plants);

      hideRecCard();
      render();
    });

    // 点击遮罩关闭推荐卡片
    document.getElementById('recOverlay').addEventListener('click', function(e) {
      if (e.target === this) {
        hideRecCard();
      }
    });

    // ========== 科/属详情页事件 ==========
    document.getElementById('taxonomyClose').addEventListener('click', hideTaxonomyCard);
    document.getElementById('taxonomyOverlay').addEventListener('click', function(e) {
      if (e.target === this) {
        hideTaxonomyCard();
      }
    });

    // 初始化
    render();

    // ========== 同步逻辑（简化版） ==========
    (function() {
      var SYNC_USERNAME = '老子';
      var DAILY_AUTH_KEY = 'sync_daily_auth';
      var toastTimer = null;

      // 重建植物列表（从 localStorage 恢复后刷新界面）
      function rebuildPlantsFromStorage() {
        var savedZonePlants = getZonePlants();
        var boughtNames = getBoughtNames();
        if (!savedZonePlants) return;
        
        var newPlants = [];
        savedZonePlants.forEach(function(sp) {
          var dbPlant = findInDatabase(sp.name);
          if (dbPlant) {
            var p = {
              name: dbPlant.name,
              zone: sp.zone,
              family: dbPlant.family,
              origin: dbPlant.origin,
              difficulty: dbPlant.difficulty,
              light: dbPlant.light,
              temperature: dbPlant.temperature,
              humidity: dbPlant.humidity,
              watering: dbPlant.watering,
              fertilizer: dbPlant.fertilizer,
              soil: dbPlant.soil
            };
            if (boughtNames.indexOf(dbPlant.name) !== -1) {
              p.bought = true;
            }
            newPlants.push(p);
          }
        });
        
        plants.length = 0;
        newPlants.forEach(function(p) { plants.push(p); });
        render();
      }

      // 显示 toast 提示
      function showToast(message, type) {
        var toast = document.getElementById('syncToast');
        var icon = '';
        if (type === 'error') icon = '❌ ';
        
        toast.textContent = icon + message;
        toast.className = 'sync-toast sync-toast-show sync-toast-' + type;
        
        if (toastTimer) clearTimeout(toastTimer);
        if (type !== 'syncing') {
          toastTimer = setTimeout(function() {
            toast.className = 'sync-toast';
          }, 3000);
        }
      }

      // 配置 syncManager
      syncManager.configure({
        onStatus: function(info) {
          showToast(info.message, info.status);
        },
        onDataChange: function(zonePlants, boughtNames) {
          rebuildPlantsFromStorage();
        }
      });

      // 检查今日是否已验证
      function isTodayAuthed() {
        var saved = localStorage.getItem(DAILY_AUTH_KEY);
        if (!saved) return false;
        var today = new Date().toISOString().slice(0, 10);
        return saved === today;
      }

      // 标记今日已验证
      function markTodayAuthed() {
        var today = new Date().toISOString().slice(0, 10);
        localStorage.setItem(DAILY_AUTH_KEY, today);
      }

      // 显示每日验证弹窗
      function showDailyAuth() {
        var overlay = document.getElementById('dailyAuthOverlay');
        var input = document.getElementById('dailyAuthInput');
        input.value = '';
        overlay.classList.add('active');
        caretEl.classList.add('active');
        updateCaretPosition();
        setTimeout(function() {
          input.focus();
        }, 100);
      }

      // 验证用户名
      function verifyUsername() {
        var input = document.getElementById('dailyAuthInput');
        var dialog = document.querySelector('.daily-auth-dialog');
        var name = input.value.trim();
        
        if (!name || name !== SYNC_USERNAME) {
          // 验证不正确，弹窗抖动
          dialog.classList.remove('shake');
          // 强制重排以重新触发动画
          void dialog.offsetWidth;
          dialog.classList.add('shake');
          input.value = '';
          input.focus();
          updateCaretPosition();
          return;
        }
        
        // 验证通过
        markTodayAuthed();
        syncManager.setUsername(SYNC_USERNAME);
        document.getElementById('dailyAuthOverlay').classList.remove('active');
        
        // 每日首次验证后，从云端拉取最新数据刷新页面
        syncManager.pullFromCloud().catch(function() {});
      }

      // 验证按钮
      document.getElementById('dailyAuthConfirm').addEventListener('click', verifyUsername);

      // 回车确认
      document.getElementById('dailyAuthInput').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') verifyUsername();
      });

      // 闪烁光标定位
      var caretEl = document.getElementById('dailyAuthCaret');
      var authInput = document.getElementById('dailyAuthInput');

      function updateCaretPosition() {
        var text = authInput.value;
        // 用临时 canvas 测量文本宽度
        var canvas = document.createElement('canvas');
        var ctx = canvas.getContext('2d');
        var style = window.getComputedStyle(authInput);
        ctx.font = style.fontSize + ' ' + style.fontFamily;
        var textWidth = ctx.measureText(text).width;
        var inputWidth = authInput.offsetWidth;
        // text-align: center, 光标在文字右边
        var left = (inputWidth / 2) + (textWidth / 2);
        caretEl.style.left = left + 'px';
      }

      authInput.addEventListener('focus', function() {
        caretEl.classList.add('active');
        updateCaretPosition();
      });

      authInput.addEventListener('blur', function() {
        // 弹窗显示期间保持光标闪烁
        var overlay = document.getElementById('dailyAuthOverlay');
        if (!overlay.classList.contains('active')) {
          caretEl.classList.remove('active');
        }
      });

      authInput.addEventListener('input', updateCaretPosition);
      authInput.addEventListener('keyup', updateCaretPosition);

      // 同步按钮：将本地当前状态上传到云端（覆盖）
      document.getElementById('btnSync').addEventListener('click', function() {
        if (!syncManager.isConfigured()) {
          showToast('同步未配置', 'error');
          return;
        }
        if (!isTodayAuthed()) {
          showDailyAuth();
          return;
        }
        // 确保用户名已设置
        if (!syncManager.getUsername()) {
          syncManager.setUsername(SYNC_USERNAME);
        }
        syncManager.pushToCloud().catch(function() {});
      });

      // 初始化
      syncManager.init();

      // 页面加载时：如果今日未验证，弹出验证框
      if (location.search.indexOf('preview=auth') !== -1) {
        setTimeout(showDailyAuth, 300);
      } else if (syncManager.isConfigured() && !isTodayAuthed()) {
        // 延迟一点显示，等页面渲染完
        setTimeout(showDailyAuth, 500);
      } else if (isTodayAuthed()) {
        // 今日已验证：设置用户名并从云端拉取最新数据刷新页面
        if (!syncManager.getUsername()) {
          syncManager.setUsername(SYNC_USERNAME);
        }
        // 用户主动刷新页面时，按云端最新状态显示内容
        syncManager.pullFromCloud().catch(function() {});
      }
    })();
  </script>

</body>
</html>
